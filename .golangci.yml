version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: all
  disable:
    # Justified disables — each has a reason here per ADR-050.
    # depguard is enabled with ADR-069 §1 forbid rules; see settings.depguard below.
    # Too noisy: Go literals do not always initialize every field.
    - exhaustruct
    # gofumpt handles wrapping where Go syntax benefits from it.
    - lll
    # Too pedantic for short, guard-heavy Go functions.
    - nlreturn
    # Useful practice, but not mandatory for every test.
    - paralleltest
    # Struct tag naming will be handled by focused tests where relevant.
    - tagliatelle
    # Same-package tests are deliberate for unexported seams.
    - testpackage
    # Often disagrees with idiomatic Go names like i, ok, and w.
    - varnamelen
    # Conflicts with gofumpt's formatting model.
    - wsl
    # Conflicts with gofumpt's formatting model.
    - wsl_v5
  settings:
    depguard:
      # ADR-069 §1 — af does not make outbound HTTP requests from its own code.
      # The slicer / gh / ssh subprocesses we shell out to may do so on their
      # own. Direct net/http use from within af is forbidden outside the
      # sandbox transport layer, where future enhancements may need it.
      rules:
        no-outbound-net:
          list-mode: lax
          files:
            - $all
            - "!**/internal/sandbox/**"
            - "!**/internal/remote/**"
            - "!**/internal/pr/**"
          deny:
            - pkg: net/http
              desc: "ADR-069 §1: af does not make outbound HTTP calls; shell out to gh/slicer/ssh subprocesses instead."
    errcheck:
      check-blank: true
      check-type-assertions: true
    forbidigo:
      # Issue #3 / ADR-037: a raw WithLock(ReadState + mutate + WriteState)
      # closure makes an unlocked read-modify-write representable by
      # accident. session.Update collapses that shape into one call.
      # Call sites that must interleave an external side effect (a gh/git/
      # slicer/tmux call, or another read) between the read and the write
      # cannot use Update and stay on WithLock with a documented
      # //nolint:forbidigo. internal/session itself is exempt (it calls
      # WriteState unqualified, so this qualified pattern never matches
      # there); test files are exempt below since fixture setup writes are
      # not a concurrency concern.
      forbid:
        - pattern: 'session\.WriteState$'
          msg: "use session.Update for a read-modify-write sequence instead of hand-rolling WithLock+ReadState+WriteState; if this call site truly can't (a side effect must run mid-critical-section), add //nolint:forbidigo with a reason"
    goconst:
      min-len: 3
      min-occurrences: 3
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
        - opinionated
        - experimental
      disabled-checks:
        # 80-byte threshold is too tight for ordinary option structs.
        - hugeParam
        # Conflicts with nonamedreturns; explicit return values are clearer.
        - unnamedResult
    govet:
      enable-all: true
    ireturn:
      # The Registry deliberately returns the Agent interface to hide concrete
      # provider implementations behind a stable abstraction (registry pattern).
      allow:
        - anon
        - error
        - empty
        - stdlib
        - 'github\.com/kakkoyun/af/internal/agent\.Agent'
    revive:
      rules:
        - name: var-naming
        - name: exported
        - name: unused-parameter
        - name: package-comments
        - name: unused-receiver
    staticcheck:
      checks:
        - all
  exclusions:
    rules:
      # Test files legitimately call session.WriteState directly to seed
      # fixture state before the code under test runs; that's not the
      # unlocked-read-modify-write hazard the forbidigo rule above guards
      # against, so it would just be nolint noise.
      - path: _test\.go
        linters:
          - forbidigo
