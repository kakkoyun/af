[book]
title = "af — User Guide"
authors = ["Kemal Akkoyun"]
language = "en"
multilingual = false
src = "src"

[output.html]
site-url = "/guide/"
git-repository-url = "https://github.com/kakkoyun/af"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/kakkoyun/af/edit/main/book/src/{path}"
