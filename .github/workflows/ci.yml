name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # ── Formatting ─────────────────────────────────────────────────────────────
  fmt:
    name: "fmt"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: make fmt-check

  # ── Lint ───────────────────────────────────────────────────────────────────
  # Prebuilt binary via golangci-lint-action instead of `go run .../v2/cmd/golangci-lint@...`,
  # which compiles the linter from source on every run (~5-10 min). Version is
  # read from the Makefile pin so there is exactly one source of truth
  # (issue #4).
  lint:
    name: "lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - id: pins
        run: echo "golangci=v$(sed -n 's/^GOLANGCI_LINT_VERSION *= *//p' Makefile)" >> "$GITHUB_OUTPUT"
      - uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ steps.pins.outputs.golangci }}

  # ── Tests (race + shuffle, incl. testscript goldens) ──────────────────────
  # Coverage is folded into the ubuntu leg here rather than run again in a
  # separate job (issue #4): race + atomic coverage instrumentation compose
  # fine, so this avoids re-running the whole suite a second time just to
  # measure it.
  test:
    name: "test / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: "Test + coverage (ubuntu)"
        if: matrix.os == 'ubuntu-latest'
        run: go test -race -count=1 -shuffle=on -covermode=atomic -coverprofile=coverage.out ./...
      - name: "Test (macos)"
        if: matrix.os != 'ubuntu-latest'
        run: make test
      - name: "Coverage floor check"
        if: matrix.os == 'ubuntu-latest'
        run: ./scripts/coverage-check.sh coverage.out
      - name: "Coverage summary"
        if: matrix.os == 'ubuntu-latest'
        run: go tool cover -func=coverage.out >> "$GITHUB_STEP_SUMMARY"

  # ── Property tests (10k iterations) ────────────────────────────────────────
  property:
    name: "property"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: make test-property

  # ── Build smoke ─────────────────────────────────────────────────────────────
  build:
    name: "build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: make build
      - run: ./bin/af version

  # ── macOS integration: real Keychain + real tmux ───────────────────────────
  integration-macos:
    name: "integration / macos"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: "Install tmux"
        run: brew install tmux
      - name: "Create and unlock a throwaway keychain"
        run: |
          security create-keychain -p ci-password af-ci.keychain
          security set-keychain-settings -lut 21600 af-ci.keychain
          security unlock-keychain -p ci-password af-ci.keychain
          security default-keychain -s af-ci.keychain
          security list-keychains -d user -s af-ci.keychain
      - run: make test-integration

  # ── goreleaser config check (local-only release per ADR-053) ───────────────
  # Prebuilt binary via goreleaser-action (install-only) instead of
  # `go run .../goreleaser@...`, which compiles from source on every run.
  # Version is read from the Makefile pin (issue #4).
  goreleaser-check:
    name: "goreleaser-check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - id: pins
        run: echo "goreleaser=v$(sed -n 's/^GORELEASER_VERSION *= *//p' Makefile)" >> "$GITHUB_OUTPUT"
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: ${{ steps.pins.outputs.goreleaser }}
          install-only: true
      - run: goreleaser check --config .goreleaser.yaml

  # ── Gate ───────────────────────────────────────────────────────────────────
  required:
    name: "all checks passed"
    if: always()
    needs: [fmt, lint, test, property, build, integration-macos, goreleaser-check]
    runs-on: ubuntu-latest
    steps:
      - name: "Check required jobs"
        run: |
          failing=$(echo "$NEEDS_JSON" | jq -r 'to_entries[] | select(.value.result != "success" and .value.result != "skipped") | "\(.key): \(.value.result)"')
          if [ -n "$failing" ]; then
            echo "❌ Failed jobs:"
            echo "$failing"
            exit 1
          fi
          echo "✅ All required jobs passed"
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
