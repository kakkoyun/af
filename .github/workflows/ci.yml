name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # ── Formatting ─────────────────────────────────────────────────────────────
  fmt:
    name: "fmt"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: make fmt-check

  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: "lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: make lint

  # ── Tests (race + shuffle, incl. testscript goldens) ──────────────────────
  test:
    name: "test / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: make test

  # ── Property tests (10k iterations) ────────────────────────────────────────
  property:
    name: "property"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: make test-property

  # ── Build smoke ─────────────────────────────────────────────────────────────
  build:
    name: "build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: make build
      - run: ./bin/af version

  # ── Coverage floors ─────────────────────────────────────────────────────────
  coverage:
    name: "coverage"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -shuffle=on -coverprofile=coverage.out -covermode=atomic ./...
      - run: ./scripts/coverage-check.sh coverage.out
      - name: "Coverage summary"
        run: go tool cover -func=coverage.out >> "$GITHUB_STEP_SUMMARY"

  # ── goreleaser config check (local-only release per ADR-053) ───────────────
  goreleaser-check:
    name: "goreleaser-check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go run github.com/goreleaser/goreleaser/v2@v2.8.2 check --config .goreleaser.yaml

  # ── Gate ───────────────────────────────────────────────────────────────────
  required:
    name: "all checks passed"
    if: always()
    needs: [fmt, lint, test, property, build, coverage, goreleaser-check]
    runs-on: ubuntu-latest
    steps:
      - name: "Check required jobs"
        run: |
          failing=$(echo "$NEEDS_JSON" | jq -r 'to_entries[] | select(.value.result != "success" and .value.result != "skipped") | "\(.key): \(.value.result)"')
          if [ -n "$failing" ]; then
            echo "❌ Failed jobs:"
            echo "$failing"
            exit 1
          fi
          echo "✅ All required jobs passed"
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
