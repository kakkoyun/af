version: 2

project_name: af

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: af
    main: ./cmd/af
    binary: af
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ignore:
      - goos: darwin
        goarch: amd64 # ship darwin/arm64 only
    ldflags:
      - -s -w
      - -X github.com/kakkoyun/af/internal/version.Version={{.Version}}
      - -X github.com/kakkoyun/af/internal/version.Commit={{.Commit}}
      - -X github.com/kakkoyun/af/internal/version.Date={{.Date}}

archives:
  - id: af
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot+{{.ShortCommit}}"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: true
  prerelease: auto
