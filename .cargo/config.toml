# Use faster linker on Linux where lld is commonly available.
# On macOS the Apple linker (ld_prime / ld64) that ships with Xcode is already
# competitive; forcing lld there causes build failures on machines without it.
# Install lld on Linux: `sudo apt install lld` or `sudo pacman -S lld`.

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.aarch64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[build]
# Uncomment if you have lld installed globally and want to use it on all targets:
# rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[alias]
xtask = "run --package xtask --"
