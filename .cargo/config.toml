# Use faster linker when available.
# Install: `cargo install --locked cargo-binstall && cargo binstall cargo-nextest`
# Linux: `sudo apt install lld` or `sudo pacman -S lld`
# macOS: comes with Xcode toolchain

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.aarch64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[build]
# Uncomment if you have lld installed globally:
# rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[alias]
xtask = "run --package xtask --"
