# cargo-deny configuration
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
# Deny any crate with a known security vulnerability.
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"

[licenses]
# We use MIT. Allow only compatible licenses.
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
copyleft = "deny"

[[licenses.clarify]]
name = "unicode-ident"
expression = "(MIT OR Apache-2.0) AND Unicode-3.0"
license-files = [{ path = "LICENSE-UNICODE", hash = 0xb042_7f29 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
# Deny specific crates you don't want sneaking in:
# deny = [
#     { name = "openssl" },
# ]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
